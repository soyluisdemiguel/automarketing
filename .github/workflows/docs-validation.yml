name: Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate documentation scaffold
        run: python scripts/validate_docs.py

      - name: Run database migration smoke test
        run: |
          AUTOMARKETING_DATABASE_URL="sqlite+pysqlite:///./ci-smoke.db" alembic upgrade head

      - name: Run test suite
        run: python -m pytest

      - name: Validate MCP contract CLI entrypoint
        run: python scripts/validate_mcp_contract.py --help
