name: Docs Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docs-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate documentation scaffold
        run: python3 scripts/validate_docs.py
